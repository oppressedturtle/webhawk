# Serve the SPA and reverse-proxy the API under the same origin.
#
# The frontend calls `/api/*` (see src/api.ts). We strip the `/api` prefix and
# forward to the backend service, mirroring the Vite dev proxy — so the browser
# never makes a cross-origin request and CORS is a non-issue in the container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy: /api/health -> http://api:8000/health
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
